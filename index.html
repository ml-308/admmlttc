<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>管理员登录</title>
    <link rel="stylesheet" href="style/index.css">
    <link rel="stylesheet" href="style/timetable.css">
    <script src="lib/ui/init.mjs" type="module"></script>
    <script src="/src/auth-header.js" type="module"></script>
        <!-- Cloudflare Web Analytics -->
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js'
        data-cf-beacon='{"token": "db1de41e202d4b7fbcc030454b8f6a75"}'></script><!-- End Cloudflare Web Analytics -->
</head>

<body>
    <hcw-body-header>
        <hcw-button flat fill style="min-width: 5rem;" id="backBtn">返回首页</hcw-button>
        <div class="logo-area">
            <div class="logo-text">MLTTC - 管理员登录</div>
        </div>
        <p hidden-on-mobile style="margin-left: auto; color: var(--text-muted)">Beta测试版</p>
        <div id="headerAuthArea">
            <hcw-button id="themeToggleBtn" flat icon large aria-label="切换主题">🌙</hcw-button>
        </div>
    </hcw-body-header>

    <hcw-article style="max-width: 32rem; margin: 0 auto;">
        <hcw-card>
            <hcw-card-title style="font-size: 1.2rem; text-align: center;">管理员验证</hcw-card-title>
            <div style="display: flex; flex-direction: column; gap: 1rem; margin-top: 0.5rem;">
                <div class="form-group">
                    <label>邮箱 / 昵称</label>
                    <input hcw-input type="text" id="loginEmail" placeholder="输入您的邮箱或昵称" autocomplete="off">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input hcw-input type="password" id="loginPassword" placeholder="输入您的密码">
                </div>
                <div class="form-group">
                    <label>管理员令牌</label>
                    <input hcw-input type="password" id="adminToken" placeholder="输入管理员令牌">
                </div>
                <div id="loginError" class="error-msg" style="display: none;"></div>
                <hcw-button primary large flat id="loginBtn" style="min-width: 8rem; align-self: center;">
                    验证身份
                </hcw-button>
            </div>
        </hcw-card>
    </hcw-article>

    <hcw-body-footer></hcw-body-footer>

    <script>
        const backBtn = document.getElementById('backBtn');
        const loginBtn = document.getElementById('loginBtn');
        const emailInput = document.getElementById('loginEmail');
        const passInput = document.getElementById('loginPassword');
        const tokenInput = document.getElementById('adminToken');
        const errorDiv = document.getElementById('loginError');

        backBtn.addEventListener('click', () => window.location.href = '/index.html');

        loginBtn.addEventListener('click', handleLogin);

        async function handleLogin() {
            const email = emailInput.value.trim();
            const password = passInput.value.trim();
            const token = tokenInput.value.trim();

            // 基本校验
            if (!email) { showError('请输入邮箱或昵称'); return; }
            if (!password) { showError('请输入密码'); return; }
            if (!token) { showError('请输入管理员令牌'); return; }

            loginBtn.disabled = true;
            loginBtn.textContent = '验证中...';

            try {
                // 第一步：调用管理员登录 API（服务端校验邮箱密码 + 管理员权限）
                const res = await fetch('/api/admin-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok || !data.success) {
                    showError(data.message || '管理员账号或密码错误');
                    loginBtn.disabled = false;
                    loginBtn.textContent = '验证身份';
                    return;
                }

                // 第二步：获取用户档案，校验管理员令牌
                const profileRes = await fetch('/api/profile', { credentials: 'include' });
                if (!profileRes.ok) {
                    showError(`获取用户信息失败 (${profileRes.status}): ${errorText}`);
                    loginBtn.disabled = false;
                    loginBtn.textContent = '验证身份';
                    return;
                }
                const profileData = await profileRes.json();
                const user = profileData.user || profileData;

                // 校验管理员令牌是否与 USER.adm 匹配（使用宽松比较以兼容类型差异）
                if (!user.adm || user.adm != token) {
                    showError('管理员令牌错误');
                    loginBtn.disabled = false;
                    loginBtn.textContent = '验证身份';
                    return;
                }

                // 验证通过，保存管理员状态（使用服务端返回的 JWT）
                sessionStorage.setItem('admin_logged_in', 'true');
                sessionStorage.setItem('admin_token', data.token);
                sessionStorage.setItem('admin_email', data.email || email);

                showError('');
                window.location.href = '/admin-review.html';
            } catch (e) {
                showError(`网络错误: ${e.message || e}`);
                loginBtn.disabled = false;
                loginBtn.textContent = '验证身份';
            }
        }

        function showError(msg) {
            if (msg) {
                errorDiv.textContent = msg;
                errorDiv.style.display = 'block';
            } else {
                errorDiv.style.display = 'none';
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>

</html>
