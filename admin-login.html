<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>
    <link rel="stylesheet" href="style/register.css">
    <script src="/src/auth-header.js" type="module"></script>
</head>

<body>
    <hcw-body-header>
        <div class="logo-area">
            <span class="logo-text">MLTTC · 管理</span>
        </div>
        <hcw-button id="themeToggleBtn" flat icon large aria-label="切换主题" style="margin-left: auto;">🌙</hcw-button>
        <a hcw-button primary flat style="min-width: 8rem;" href="index.html">返回首页</a>
    </hcw-body-header>

    <hcw-article>
        <hcw-card>
            <hcw-card-title>管理员登录</hcw-card-title>
            <p style="color: var(--text-secondary); margin-bottom: 1rem;">请使用管理员账号登录</p>
            <div class="register-form" id="loginForm">
                <div class="input-group">
                    <label for="email">邮箱</label>
                    <input hcw-input type="email" id="email" placeholder="请输入管理员邮箱" required>
                    <p id="emailMsg" class="LP" style="display: none;"></p>
                </div>
                <div class="input-group">
                    <label for="password">密码</label>
                    <input hcw-input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
                    <p id="passwordMsg" class="LP" style="display: none;"></p>
                </div>
                <br>
                <button hcw-button primary flat style="min-width: 8rem;" type="submit" id="loginBtn">登 录</button>
                <div class="error-msg" id="errorMsg" style="display: none; margin-top: 0.5rem;"></div>
                <div id="loadingMsg" style="display: none; margin-top: 0.5rem; color: var(--text-secondary); text-align: center;">登录中...</div>
            </div>
        </hcw-card>
    </hcw-article>

    <script type="module">
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const loadingMsg = document.getElementById('loadingMsg');
        const emailMsg = document.getElementById('emailMsg');
        const passwordMsg = document.getElementById('passwordMsg');

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            loadingMsg.style.display = 'none';
            loginBtn.disabled = false;
        }

        loginBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email) {
                emailMsg.textContent = '请输入邮箱';
                emailMsg.style.display = 'block';
                return;
            }
            if (!password) {
                passwordMsg.textContent = '请输入密码';
                passwordMsg.style.display = 'block';
                return;
            }

            loginBtn.disabled = true;
            loadingMsg.style.display = 'block';
            errorMsg.style.display = 'none';

            try {
                const res = await fetch('/api/admin-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok || !data.success) {
                    showError(data.message || '登录失败');
                    return;
                }

                // 保存 JWT + 邮箱到 sessionStorage
                sessionStorage.setItem('admin_token', data.token);
                sessionStorage.setItem('admin_email', data.email);
                sessionStorage.setItem('admin_logged_in', 'true');

                // 跳转到管理后台
                window.location.href = '/admin-review.html';
            } catch (err) {
                showError('网络错误，请重试');
            }
        });

        // 回车键提交
        passwordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });
        emailInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') passwordInput.focus();
        });
    </script>
</body>

</html>
